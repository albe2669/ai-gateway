# Attaches a retry policy to the HTTPRoute generated by the AIGatewayRoute,
# so the upstream stream reset is retried to the backend in the rule.
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: first-token-timeout
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: first-token-timeout
  retry:
    numAttemptsPerPriority: 1
    numRetries: 2
    perRetry:
      backOff:
        baseInterval: 100ms
        maxInterval: 1s
    retryOn:
      triggers:
        # `reset` covers the case where the stream is reset by Envoy
        - reset
        - connect-failure
        - retriable-status-codes
      httpStatusCodes:
        - 502
        - 503
        - 504
